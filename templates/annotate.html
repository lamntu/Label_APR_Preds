<!DOCTYPE html>
<html>

<head>
<title>{{annotator}} | {{bug_id}} {% if annotated == True %} ✔{% endif %}</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css">

<!--<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">-->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.2.0/diff.min.js"></script>

<!-- Prism light theme -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet"/>
<!-- Line numbers plugin CSS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" rel="stylesheet"/>
<!-- Prism core -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<!-- Java language -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
<!-- Line numbers plugin -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>


<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">

<!--&lt;!&ndash; Include Prism JS &ndash;&gt;-->
<!--<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>-->
<!--<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>-->
<script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html.min.js"></script>

<!--<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>-->
<script src="/static/annotate.js"></script>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<a href="/records">← Back to list</a>

<h1>Record {{bug_id}} {% if annotated == True %} ✔{% endif %}</h1>
<h2>Annotator: {{annotator}}</h2>

<h3>1. Buggy Code</h3>
<!--<button type="button" class="collapsible">Show ▸</button>-->
<!--<div class="content">-->
<pre class="line-numbers"><code class="language-java">{{buggy}}</code></pre>
<!--</div>-->

<h3>2. Bug Info</h3>
<!--<button type="button" class="collapsible">Show ▸</button>-->
<!--<div class="content">-->
<pre class="field-box" id="bug_info">{{bug_info}}</pre>
<!--</div>-->

<h3>3. Developer Fix</h3>

<div id="devdiff"></div>

<h3>4. LLM Explanation</h3>

<pre class="field-box" id="explanation">{{explanation}}</pre>


<h3>5. LLM Fix</h3>

<button type="button" class="collapsible">Show ▸</button>
<div class="content">
<div id="llmdiff"></div>
</div>

<!--<br>-->
<hr>

<h3>
<label>6. Label</label>

<select class="big" id="label" required>
<!--<optgroup>-->
<option value="incorrect" {% if label == "incorrect" %} selected {% endif %}>incorrect</option>
<option value="unsure" {% if label == "unsure" %} selected {% endif %}>unsure</option>
<option value="correct" {% if label == "correct" %} selected {% endif %}>correct</option>
<!--</optgroup>-->
</select>
</h3>

<h4>Your Confidence
<select class="big" id="confidence" required>
<!--<optgroup>-->
<option value="1" {% if confidence == 1 %} selected {% endif %}>1</option>
<option value="2" {% if confidence == 2 %} selected {% endif %}>2</option>
<option value="3" {% if confidence == 3 %} selected {% endif %}>3</option>
<option value="4" {% if confidence == 4 %} selected {% endif %}>4</option>
<option value="5" {% if confidence == 5 %} selected {% endif %}>5</option>
<!--</optgroup>-->
</select>
</h4>

<!--<br>-->

<h4>Note</h4>
<textarea id="comment" rows="5" cols="100">{{comment}}</textarea>

<br><br>

<button onclick="submitLabel()">Save</button>

<br><br>

<a href="/records">← Back to list</a>

<script>
let recordId = `{{idx}}`
let buggy = `{{buggy}}`
let devfix = `{{dev_fix}}`
let llmfix = `{{llm_fix}}`
let startTime = {{start_time}}
</script>

</body>
</html>
