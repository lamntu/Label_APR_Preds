<!DOCTYPE html>
<html>

<head>
<title>{{annotator}} | {{bug_id}} {% if annotated == True %} ✔{% endif %}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css">

<!--<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">-->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.2.0/diff.min.js"></script>

<!-- Prism light theme -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet"/>
<!-- Line numbers plugin CSS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" rel="stylesheet"/>
<!-- Prism core -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<!-- Java language -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
<!-- Line numbers plugin -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>


<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">

<!--&lt;!&ndash; Include Prism JS &ndash;&gt;-->
<!--<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>-->
<!--<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>-->
<script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html.min.js"></script>

<!--<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>-->
<script src="/static/annotate.js"></script>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<header class="app-header annotate-header">
  <div>
    <a class="back-link" href="/records">Back to list</a>
    <p class="eyebrow">Record</p>
    <h1>{{bug_id}} {% if annotated == True %}<span class="status-dot" title="Annotated"></span>{% endif %}</h1>
  </div>
  <div class="header-meta">
    <span>{{annotator}}</span>
  </div>
</header>

<main class="annotation-layout">
  <section class="review-stack">
    <section class="review-section">
      <h2>Buggy code</h2>
      <pre class="line-numbers code-panel"><code class="language-java">{{buggy}}</code></pre>
    </section>

    <section class="review-section">
      <h2>Bug info</h2>
      <pre class="field-box" id="bug_info">{{bug_info}}</pre>
    </section>

    <section class="review-section">
      <h2>Developer fix</h2>
      <div id="devdiff" class="diff-panel"></div>
    </section>

    <section class="review-section">
      <h2>LLM explanation</h2>
      <pre class="field-box" id="explanation">{{explanation}}</pre>
    </section>

    <section class="review-section">
      <div class="section-row">
        <h2>LLM fix</h2>
        <button type="button" class="collapsible">Show</button>
      </div>
      <div class="content">
        <div id="llmdiff" class="diff-panel"></div>
      </div>
    </section>
  </section>

  <aside class="decision-panel" aria-label="Annotation decision">
    <div class="decision-card">
      <h2>Decision</h2>

      <div class="decision-body">
      <div class="slider-field">
        <div class="slider-header">
          <label for="label-slider">Label</label>
          <output id="label-value" for="label-slider">{{label}}</output>
        </div>
        <input type="hidden" id="label" value="{{label}}">
        <input class="range-control label-slider" type="range" id="label-slider" min="0" max="2" step="1" value="{% if label == "incorrect" %}0{% elif label == "unsure" %}1{% else %}2{% endif %}" aria-valuemin="incorrect" aria-valuemax="correct">
        <div class="range-ticks label-ticks" aria-hidden="true">
          <span>incorrect</span>
          <span>unsure</span>
          <span>correct</span>
        </div>
      </div>

      <div class="slider-field">
        <div class="slider-header">
          <label for="confidence">Confidence</label>
          <output id="confidence-value" for="confidence">{{confidence}}</output>
        </div>
        <input class="range-control" type="range" id="confidence" min="1" max="5" step="1" value="{{confidence}}" required>
        <div class="range-ticks" aria-hidden="true">
          <span>1</span>
          <span>2</span>
          <span>3</span>
          <span>4</span>
          <span>5</span>
        </div>
      </div>

      <label for="comment">Note</label>
      <textarea id="comment" rows="7">{{comment}}</textarea>

      <button id="save-button" class="button-primary save-button" onclick="submitLabel()">Save</button>
      <p id="save-status" class="save-status" role="status" aria-live="polite"></p>
      </div>
    </div>
  </aside>
</main>

<script>
let recordId = {{idx|tojson}}
let buggy = {{buggy|tojson}}
let devfix = {{dev_fix|tojson}}
let llmfix = {{llm_fix|tojson}}
let startTime = {{start_time|tojson}}
</script>

</body>
</html>
