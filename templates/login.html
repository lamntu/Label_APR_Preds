<!DOCTYPE html>
<html>

<head>
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<main class="auth-shell">
<section class="auth-panel">
<p class="eyebrow">Annotation workspace</p>
<h1>Select annotator</h1>

<p class="muted">Stored results depend on the selected annotator.</p>

<form method="POST">

<select class="big" name="annotator">

{% for a in annotators %}
<option value="{{a}}">{{a}}</option>
{% endfor %}

</select>

<br><br>

<button class="button-primary" type="submit">Start</button>

</form>
</section>
</main>

</body>

</html>
